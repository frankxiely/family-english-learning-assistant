name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Resolve public web config
        env:
          CONFIGURED_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          CONFIGURED_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -n "$CONFIGURED_BASE_PATH" ]; then
            echo "VITE_BASE_PATH=$CONFIGURED_BASE_PATH" >> "$GITHUB_ENV"
          elif [[ "$REPO_NAME" == *.github.io ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

          if [ -n "$CONFIGURED_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL=${CONFIGURED_API_BASE_URL%/}" >> "$GITHUB_ENV"
          else
            echo "::warning::VITE_API_BASE_URL is empty. The public page will build, but API calls will not work until the repository variable is set."
          fi

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web

      - name: Add SPA fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
